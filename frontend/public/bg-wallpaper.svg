<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a12" />
      <stop offset="50%" stop-color="#0c1020" />
      <stop offset="100%" stop-color="#05070e" />
    </linearGradient>

    <!-- Neon Cyan & Purple Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.7" />
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.7" />
    </linearGradient>

    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Dark Cyber Void -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Diagonal Main Tech Energy Stream Container (Rotated Group) -->
  <g transform="translate(960, 540) rotate(-35) translate(-960, -540)">

    <!-- Ambient Glowing Light Beams -->
    <line x1="-500" y1="520" x2="2500" y2="520" stroke="#06b6d4" stroke-width="4" opacity="0.6" filter="url(#glowCyan)" />
    <line x1="-500" y1="540" x2="2500" y2="540" stroke="#a855f7" stroke-width="6" opacity="0.8" filter="url(#glowPurple)" />
    <line x1="-500" y1="560" x2="2500" y2="560" stroke="#06b6d4" stroke-width="3" opacity="0.5" filter="url(#glowCyan)" />

    <!-- Wave Signal Ribbon -->
    <path d="M -400,540 Q -200,480 0,540 T 400,540 T 800,540 T 1200,540 T 1600,540 T 2000,540 T 2400,540" 
          fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.75" filter="url(#glowCyan)" />
    <path d="M -400,540 Q -200,600 0,540 T 400,540 T 800,540 T 1200,540 T 1600,540 T 2000,540 T 2400,540" 
          fill="none" stroke="#ec4899" stroke-width="3" opacity="0.75" filter="url(#glowPurple)" />

    <!-- Geometric Crystal Triangles & Polygons Cluster 1 -->
    <g opacity="0.85" filter="url(#glowCyan)">
      <polygon points="200,500 280,420 340,500" fill="url(#cyanGrad)" />
      <polygon points="280,420 380,380 340,500" fill="url(#purpleGrad)" opacity="0.7" />
      <polygon points="340,500 380,380 440,480" fill="url(#magentaGrad)" />
      <polygon points="200,500 340,500 290,560" fill="url(#cyanGrad)" opacity="0.6" />
      <polygon points="340,500 440,480 390,570" fill="url(#purpleGrad)" />
    </g>

    <!-- Geometric Crystal Cluster 2 -->
    <g opacity="0.9" filter="url(#glowPurple)">
      <polygon points="700,540 820,440 900,540" fill="url(#purpleGrad)" />
      <polygon points="820,440 960,390 900,540" fill="url(#cyanGrad)" opacity="0.8" />
      <polygon points="900,540 960,390 1050,510" fill="url(#magentaGrad)" />
      <polygon points="700,540 900,540 830,620" fill="url(#magentaGrad)" opacity="0.7" />
      <polygon points="900,540 1050,510 980,630" fill="url(#cyanGrad)" />
    </g>

    <!-- Geometric Crystal Cluster 3 -->
    <g opacity="0.85" filter="url(#glowCyan)">
      <polygon points="1300,490 1410,400 1480,490" fill="url(#cyanGrad)" />
      <polygon points="1410,400 1540,360 1480,490" fill="url(#purpleGrad)" opacity="0.75" />
      <polygon points="1480,490 1540,360 1620,470" fill="url(#magentaGrad)" />
      <polygon points="1300,490 1480,490 1410,570" fill="url(#purpleGrad)" opacity="0.65" />
    </g>

    <!-- Floating Neon Icons: Magnifying Glasses -->
    <!-- Icon 1 -->
    <g transform="translate(480, 420)" filter="url(#glowCyan)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#06b6d4" stroke-width="4" />
      <line x1="16" y1="16" x2="30" y2="30" stroke="#06b6d4" stroke-width="5" stroke-linecap="round" />
    </g>
    <!-- Icon 2 -->
    <g transform="translate(1120, 430)" filter="url(#glowPurple)">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#a855f7" stroke-width="5" />
      <line x1="18" y1="18" x2="36" y2="36" stroke="#a855f7" stroke-width="6" stroke-linecap="round" />
    </g>
    <!-- Icon 3 -->
    <g transform="translate(1680, 450)" filter="url(#glowCyan)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#06b6d4" stroke-width="4" />
      <line x1="14" y1="14" x2="26" y2="26" stroke="#06b6d4" stroke-width="5" stroke-linecap="round" />
    </g>

    <!-- Floating Location Pin Icons -->
    <g transform="translate(620, 360)" filter="url(#glowCyan)">
      <path d="M 0,-20 A 15,15 0 0,0 -15,-5 C -15,10 0,25 0,25 C 0,25 15,10 15,-5 A 15,15 0 0,0 0,-20 Z" fill="none" stroke="#06b6d4" stroke-width="3" />
      <circle cx="0" cy="-5" r="5" fill="#06b6d4" />
    </g>
    <g transform="translate(1260, 370)" filter="url(#glowPurple)">
      <path d="M 0,-20 A 15,15 0 0,0 -15,-5 C -15,10 0,25 0,25 C 0,25 15,10 15,-5 A 15,15 0 0,0 0,-20 Z" fill="none" stroke="#ec4899" stroke-width="3" />
      <circle cx="0" cy="-5" r="5" fill="#ec4899" />
    </g>
    <g transform="translate(860, 680)" filter="url(#glowCyan)">
      <path d="M 0,-20 A 15,15 0 0,0 -15,-5 C -15,10 0,25 0,25 C 0,25 15,10 15,-5 A 15,15 0 0,0 0,-20 Z" fill="none" stroke="#06b6d4" stroke-width="3" />
      <circle cx="0" cy="-5" r="5" fill="#06b6d4" />
    </g>

    <!-- Floating Node Connection Webs (Constellations) -->
    <g stroke="#06b6d4" stroke-width="1.5" opacity="0.6" filter="url(#glowCyan)">
      <line x1="150" y1="350" x2="220" y2="300" />
      <line x1="220" y1="300" x2="280" y2="340" />
      <line x1="280" y1="340" x2="150" y2="350" />
      <circle cx="150" cy="350" r="4" fill="#06b6d4" />
      <circle cx="220" cy="300" r="5" fill="#a855f7" />
      <circle cx="280" cy="340" r="4" fill="#06b6d4" />
    </g>

    <g stroke="#a855f7" stroke-width="1.5" opacity="0.6" filter="url(#glowPurple)">
      <line x1="1750" y1="650" x2="1820" y2="600" />
      <line x1="1820" y1="600" x2="1890" y2="660" />
      <line x1="1890" y1="660" x2="1750" y2="650" />
      <circle cx="1750" cy="650" r="4" fill="#a855f7" />
      <circle cx="1820" cy="600" r="5" fill="#06b6d4" />
      <circle cx="1890" cy="660" r="4" fill="#ec4899" />
    </g>

    <!-- Glowing Hexagon HUD Nodes -->
    <polygon points="560,620 580,608 600,620 600,644 580,656 560,644" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7" filter="url(#glowCyan)" />
    <polygon points="1380,640 1400,628 1420,640 1420,664 1400,676 1380,664" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7" filter="url(#glowPurple)" />

  </g>
</svg>
